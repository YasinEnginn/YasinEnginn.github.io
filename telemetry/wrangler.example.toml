name = "visitor-telemetry"
main = "cloudflare-worker.js"
compatibility_date = "2026-04-22"

[vars]
ALLOWED_ORIGINS = "https://yasinenginn.github.io"
ADMIN_TOKEN = "replace-with-a-long-random-token"
STORE_RAW_IP = "false"

[[d1_databases]]
binding = "DB"
database_name = "visitor_telemetry"
database_id = "replace-with-your-d1-id"
